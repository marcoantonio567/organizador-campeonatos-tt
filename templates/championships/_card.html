<div class="col-md-4">
  <div class="card h-100 {% if historico %}border-secondary opacity-75{% endif %}">
    <div class="card-body">
      <div class="d-flex justify-content-between align-items-start">
        <h5 class="card-title mb-1">{{ ch.name }}</h5>
        {% if ch.is_finished %}
          <span class="badge bg-success">Finalizado</span>
        {% else %}
          <span class="badge bg-primary">Ativo</span>
        {% endif %}
      </div>
      <p class="text-muted small mb-2">
        <i class="bi bi-geo-alt"></i> {{ ch.local }}<br>
        <i class="bi bi-calendar"></i> {{ ch.data_inicio }}
      </p>
      <p class="text-muted small mb-0">
        <i class="bi bi-people"></i> {{ ch.enrollments.count }} participantes
      </p>
    </div>
    <div class="card-footer bg-transparent d-flex gap-2">
      <a href="{% url 'championships:detail' ch.pk %}" class="btn btn-sm btn-primary">
        <i class="bi bi-eye"></i> Detalhes
      </a>
      {% if ch.groups.exists %}
      <a href="{% url 'championships:groups' ch.pk %}" class="btn btn-sm btn-outline-secondary">
        Grupos
      </a>
      {% endif %}
      {% if ch.has_bracket %}
      <a href="{% url 'championships:bracket' ch.pk %}" class="btn btn-sm btn-outline-danger">
        Chave
      </a>
      {% endif %}
    </div>
  </div>
</div>
