<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Tênis de Mesa{% endblock %} | TT Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; }
    .navbar-brand { font-weight: 700; letter-spacing: 1px; }
    .card { border: none; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .badge-status-rascunho       { background: #6c757d; }
    .badge-status-inscricoes     { background: #0d6efd; }
    .badge-status-fase_grupos    { background: #fd7e14; }
    .badge-status-eliminatorias  { background: #dc3545; }
    .badge-status-finalizado     { background: #198754; }
    .table-standings th { background: #212529; color: #fff; }
    .bracket-round { min-width: 200px; }
    .bracket-match { border: 2px solid #dee2e6; border-radius: 6px; padding: 8px 12px; margin-bottom: 12px; background: #fff; }
    .bracket-match .winner { font-weight: 700; color: #198754; }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand" href="{% url 'championships:list' %}">
      <i class="bi bi-table"></i> TT Manager
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" href="{% url 'championships:list' %}">
            <i class="bi bi-trophy"></i> Campeonatos
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{% url 'players:list' %}">
            <i class="bi bi-people"></i> Jogadores
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container pb-5">
  {% for message in messages %}
    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
      {{ message }}
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
  {% endfor %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
