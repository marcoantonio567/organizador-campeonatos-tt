<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Tênis de Mesa{% endblock %} | TT Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<nav class="navbar navbar-expand-lg tt-navbar">
  <div class="container">
    <a class="navbar-brand" href="{% url 'championships:list' %}">
      <span class="brand-icon"><i class="bi bi-table"></i></span>
      TT Manager
    </a>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#nav" style="color:#fff">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto gap-1">
        <li class="nav-item">
          <a class="nav-link {% block nav_championships %}{% endblock %}" href="{% url 'championships:list' %}">
            <i class="bi bi-trophy-fill"></i> Campeonatos
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% block nav_players %}{% endblock %}" href="{% url 'players:list' %}">
            <i class="bi bi-people-fill"></i> Jogadores
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="tt-container">
  <div class="tt-messages">
    {% for message in messages %}
    <div class="tt-alert {% if message.tags == 'error' or message.tags == 'danger' %}danger{% elif message.tags == 'warning' %}warning{% elif message.tags == 'success' %}success{% else %}info{% endif %} alert-dismissible fade show d-flex justify-content-between" role="alert">
      <span><i class="bi bi-{% if message.tags == 'success' %}check-circle-fill{% elif message.tags == 'error' or message.tags == 'danger' %}exclamation-circle-fill{% elif message.tags == 'warning' %}exclamation-triangle-fill{% else %}info-circle-fill{% endif %} me-2"></i>{{ message }}</span>
      <button type="button" class="btn-close ms-3 flex-shrink-0" data-bs-dismiss="alert" style="font-size:.7rem;margin-top:.1rem"></button>
    </div>
    {% endfor %}
  </div>

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
