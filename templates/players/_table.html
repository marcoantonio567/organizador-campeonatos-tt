<div class="card border-top-0 rounded-top-0">
  <div class="card-body p-0">
    <table class="table table-hover mb-0">
      <thead class="table-dark">
        <tr>
          <th>#</th>
          <th>Nome</th>
          <th>Pontos</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        {% for ranking in ranking_list %}
        <tr>
          <td class="text-muted">{{ forloop.counter }}</td>
          <td><a href="{% url 'players:detail' ranking.player.pk %}">{{ ranking.player.name }}</a></td>
          <td><strong>{{ ranking.pontos }}</strong> pts</td>
          <td class="text-end">
            <a href="{% url 'players:update' ranking.player.pk %}" class="btn btn-sm btn-outline-secondary">
              <i class="bi bi-pencil"></i>
            </a>
            <a href="{% url 'players:delete' ranking.player.pk %}" class="btn btn-sm btn-outline-danger">
              <i class="bi bi-trash"></i>
            </a>
          </td>
        </tr>
        {% empty %}
        <tr>
          <td colspan="4" class="text-center text-muted py-4">
            Nenhum jogador {{ empty_label|lower }} cadastrado.
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
