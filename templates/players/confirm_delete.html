{% extends 'base.html' %}
{% block title %}Excluir Jogador{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card border-danger">
      <div class="card-header bg-danger text-white"><h5 class="mb-0">Confirmar Exclusão</h5></div>
      <div class="card-body">
        <p>Deseja excluir o jogador <strong>{{ player.name }}</strong>?</p>
        <p class="text-muted small">Esta ação não pode ser desfeita.</p>
        <form method="post" class="d-flex gap-2">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger">Excluir</button>
          <a href="{% url 'players:list' %}" class="btn btn-outline-secondary">Cancelar</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
